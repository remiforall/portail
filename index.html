<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <!-- a11y : pas de user-scalable=no ni maximum-scale (WCAG 1.4.4) -->
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PORTAIL — spike J0</title>

  <!-- importmap : libs vendored en local, zéro CDN au runtime.
       Lancer d'abord ./libs/fetch-libs.sh pour les récupérer. -->
  <script type="importmap">
  {
    "imports": {
      "three": "./libs/three.module.js",
      "mindar-image-three": "./libs/mindar-image-three.prod.js"
    }
  }
  </script>

  <style>
    :root { --cible: 56px; }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: #000; color: #f5f5f5;
      font-family: system-ui, "Atkinson Hyperlegible", Verdana, sans-serif; }
    #ar-container { position: fixed; inset: 0; }

    /* Indice de scan */
    #scan-hint {
      position: fixed; left: 50%; bottom: 12vh; transform: translateX(-50%);
      max-width: 90vw; padding: .8rem 1.2rem; border-radius: 12px;
      background: rgba(10,26,47,.85); text-align: center; font-size: 1.05rem;
      line-height: 1.4;
    }
    #scan-hint[hidden] { display: none; }

    /* Bouton Sortir — garde-fou permanent (E1 / sûreté), >=44px */
    #sortir {
      position: fixed; top: env(safe-area-inset-top, 12px); right: 12px;
      min-height: var(--cible); min-width: var(--cible);
      padding: 0 1.1rem; border: 2px solid #f5f5f5; border-radius: 12px;
      background: rgba(0,0,0,.6); color: #f5f5f5; font-size: 1.05rem;
      font-weight: 700; cursor: pointer;
    }
    #sortir:focus-visible { outline: 3px solid #6ec5ff; outline-offset: 2px; }

    /* Indicateur d'état immersion */
    #etat {
      position: fixed; left: 12px; top: env(safe-area-inset-top, 12px);
      padding: .4rem .8rem; border-radius: 10px; background: rgba(0,0,0,.6);
      font-size: .95rem;
    }
    .sr-only {
      position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0 0 0 0); white-space: nowrap; border: 0;
    }
  </style>
</head>
<body>
  <main id="ar-container" aria-label="Vue de réalité augmentée"></main>

  <p id="scan-hint">📸 Cadre ton <strong>polaroid</strong> dans la vue.<br>Le portail s'ouvrira dessus.</p>

  <button id="sortir" type="button" aria-describedby="aide-sortir">Sortir</button>
  <span id="aide-sortir" class="sr-only">Quitte le monde virtuel et revient au monde réel, à tout moment, sans risque.</span>

  <p id="etat" role="status" aria-live="polite">Monde réel</p>

  <!-- Région d'annonces a11y -->
  <p class="sr-only" id="annonce" role="status" aria-live="polite"></p>

  <script type="module" src="./js/spike-portail.js"></script>
</body>
</html>
