<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PORTAIL — Éditeur concepteur</title>

  <!-- Leaflet + Leaflet.draw vendorisés (libs/). Tuiles : IGN à l'usage. -->
  <link rel="stylesheet" href="./libs/leaflet/leaflet.css">
  <link rel="stylesheet" href="./libs/leaflet-draw/leaflet.draw.css">
  <style>
    :root { --cible: 44px; --bleu: #2b6cb0; }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; font-family: system-ui, "Atkinson Hyperlegible", Verdana, sans-serif; }
    #app { display: grid; grid-template-columns: 1fr 22rem; height: 100%; }
    #carte { height: 100%; }
    #panneau { height: 100%; overflow-y: auto; padding: 1rem; background: #0f1a2b; color: #f5f5f5; }
    #panneau h1 { font-size: 1.2rem; margin: 0 0 .3rem; }
    #panneau h2 { font-size: 1rem; margin: 1.2rem 0 .4rem; border-bottom: 1px solid #2a3c55; padding-bottom: .2rem; }
    .aide { font-size: .85rem; opacity: .8; margin: .2rem 0 .6rem; }
    .barre { display: flex; flex-wrap: wrap; gap: .5rem; }
    button, .fauxbtn { font: inherit; min-height: var(--cible); padding: .5rem .8rem; border-radius: 10px;
      border: 2px solid var(--bleu); background: rgba(43,108,176,.18); color: #f5f5f5; cursor: pointer; }
    button:focus-visible, input:focus-visible, select:focus-visible { outline: 3px solid #6ec5ff; outline-offset: 2px; }
    .champ { display: flex; flex-direction: column; gap: .25rem; margin: .5rem 0; }
    .champ label { font-size: .85rem; font-weight: 700; }
    .champ input, .champ select, .champ textarea { min-height: var(--cible); padding: .5rem; border-radius: 8px;
      border: 1px solid #2a3c55; background: #050c18; color: #f5f5f5; font: inherit; }
    .champ textarea { min-height: 4rem; resize: vertical; }
    #form-selection:empty::before { content: "Sélectionne un élément sur la carte, ou crée-en un."; opacity: .6; font-size: .9rem; }
    #avertissements { margin-top: .6rem; font-size: .85rem; }
    #avertissements li { color: #ffd9a8; }
    .marqueur { font-size: 1.6rem; line-height: 1; text-shadow: 0 0 3px #000; }
  </style>
</head>
<body>
  <div id="app">
    <div id="carte" aria-label="Carte d'édition du terrain de jeu"></div>
    <aside id="panneau">
      <h1>Éditeur concepteur</h1>
      <p class="aide">Définis le terrain : dessine des <strong>zones</strong>, pose des <strong>polaroïds</strong> et des <strong>indices</strong>, puis exporte un <code>parcours.json</code> à déposer dans <code>assets/</code>.</p>

      <h2>Créer</h2>
      <div class="barre">
        <button id="btn-polaroid" type="button">📸 Polaroïd</button>
        <button id="btn-indice" type="button">🔑 Indice</button>
        <span class="aide" style="flex-basis:100%">Zones : utilise l'outil polygone (en haut à gauche de la carte).</span>
      </div>

      <h2>Élément sélectionné</h2>
      <form id="form-selection"></form>

      <h2>Paramètres du parcours</h2>
      <div class="champ"><label for="base-histoire">Histoire (Twison)</label><input id="base-histoire" value="./assets/histoire.json"></div>
      <div class="champ"><label for="base-cibles">Cibles MindAR (.mind)</label><input id="base-cibles" value="./assets/targets/polaroid.mind"></div>

      <h2>Fichier</h2>
      <div class="barre">
        <label class="fauxbtn" for="import-fichier">📂 Importer parcours.json</label>
        <input id="import-fichier" type="file" accept="application/json,.json" hidden>
        <button id="btn-export" type="button">💾 Exporter parcours.json</button>
      </div>
      <ul id="avertissements" aria-live="polite"></ul>
      <p class="aide"><a href="./index.html" style="color:#6ec5ff">← Retour au jeu</a></p>
    </aside>
  </div>

  <script src="./libs/leaflet/leaflet.js"></script>
  <script src="./libs/leaflet-draw/leaflet.draw.js"></script>
  <script type="module" src="./js/editeur.js"></script>
</body>
</html>
